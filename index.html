<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Indian Table</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0e0e0e;color:#fff}

/* HEADER */
header{
position:sticky;top:0;
background:#111;
display:flex;justify-content:space-between;align-items:center;
padding:15px 20px;z-index:10
}
.logo{color:#ffb347;font-size:22px;font-weight:bold}
.cartBtn{
background:#ffb347;color:#000;
padding:8px 14px;border-radius:8px;font-weight:bold;cursor:pointer
}

/* HERO */
.hero{
height:70vh;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');
background-size:cover;background-position:center;
display:flex;align-items:center;justify-content:center;text-align:center
}
.hero h1{font-size:40px}
.hero p{color:#ddd;margin-top:10px}
.btn{
margin-top:15px;background:#ffb347;color:#000;
padding:10px 18px;border-radius:8px;display:inline-block;text-decoration:none;font-weight:bold
}

/* MENU */
.section{padding:40px 15px}
.section h2{text-align:center;color:#ffb347;margin-bottom:20px}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px
}

.card{
background:#1a1a1a;border-radius:12px;overflow:hidden
}
.card img{width:100%;height:120px;object-fit:cover}
.card h3{padding:10px;font-size:14px}
.price{color:#ffb347;padding:0 10px}
.card button{
width:100%;padding:8px;border:none;
background:#ffb347;font-weight:bold;cursor:pointer
}

/* CART DRAWER */
.cart{
position:fixed;right:-100%;top:0;
width:300px;height:100vh;
background:#111;padding:15px;
transition:.3s;overflow:auto
}
.cart.active{right:0}
.cart h2{color:#ffb347}
.item{display:flex;justify-content:space-between;margin:10px 0}
.qtyBtn{background:#ffb347;border:none;padding:2px 6px;cursor:pointer}
.total{margin-top:15px;font-weight:bold}
.close{float:right;cursor:pointer;color:red}
.order{
background:#25D366;color:#fff;
padding:10px;text-align:center;
display:block;margin-top:15px;border-radius:8px;text-decoration:none
}

/* FOOTER */
footer{text-align:center;padding:20px;color:#aaa}
</style>
</head>

<body>

<header>
<div class="logo">The Indian Table</div>
<div class="cartBtn" onclick="toggleCart()">Cart (<span id="count">0</span>)</div>
</header>

<div class="hero">
<div>
<h1>Authentic Indian Taste</h1>
<p>Fresh • Hygienic • Premium</p>
<a href="#menu" class="btn">Order Now</a>
</div>
</div>

<section class="section" id="menu">
<h2>Menu</h2>

<div class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1565557623262-b51c2513a641">
<h3>Paneer Tikka</h3>
<div class="price">₹249</div>
<button onclick="add('Paneer Tikka',249)">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1631452180519-c014fe946bc7">
<h3>Butter Chicken</h3>
<div class="price">₹349</div>
<button onclick="add('Butter Chicken',349)">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512058564366-18510be2db19">
<h3>Veg Biryani</h3>
<div class="price">₹199</div>
<button onclick="add('Veg Biryani',199)">Add</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38">
<h3>Pizza</h3>
<div class="price">₹299</div>
<button onclick="add('Pizza',299)">Add</button>
</div>

</div>
</section>

<!-- CART -->
<div class="cart" id="cart">
<span class="close" onclick="toggleCart()">X</span>
<h2>Your Cart</h2>
<div id="cartItems"></div>
<div class="total">Total: ₹<span id="total">0</span></div>

<a class="order" id="orderBtn" target="_blank">Order on WhatsApp</a>
</div>

<footer>© 2026 The Indian Table</footer>

<script>
let cart=[]
let total=0

function add(name,price){
cart.push({name,price,qty:1})
total+=price
update()
}

function update(){
document.getElementById("count").innerText=cart.length

let html=""
cart.forEach((item,i)=>{
html+=`
<div class="item">
<span>${item.name}</span>
<span>₹${item.price}</span>
</div>`
})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total

let msg="Order:%0A"
cart.forEach(i=>{
msg+=`${i.name} - ₹${i.price}%0A`
})
msg+=`Total: ₹${total}`

document.getElementById("orderBtn").href=
`https://wa.me/919999999999?text=${msg}`
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active")
}
</script>

</body>
</html>
